<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attention Badge Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="relative bg-gray-900 rounded-lg p-6 max-w-md mx-auto overflow-hidden">
        <!-- Attention Badge -->
        <div class="absolute -top-3 left-4 bg-blue-600 text-white px-3 py-1 rounded-full flex items-center gap-2 z-10">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span class="text-sm font-medium">Attention Please</span>
        </div>
        
        <!-- Card Content -->
        <div class="pt-4">
            <h3 class="text-white text-xl font-semibold mb-3">Important Notice</h3>
            <p class="text-gray-300 leading-relaxed">
                This is an important announcement that requires your immediate attention. 
                Please review the details carefully and take appropriate action.
            </p>
            <button class="mt-4 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md transition-colors">
                Read More
            </button>
        </div>
    </div>
</body>
</html>
