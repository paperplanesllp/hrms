# Production Nginx reverse proxy for HRMS API + Socket.IO
# Backend Node.js process is expected to listen on 127.0.0.1:5000.

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name thehrsaathi.com www.thehrsaathi.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name thehrsaathi.com www.thehrsaathi.com;

    ssl_certificate /etc/letsencrypt/live/thehrsaathi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thehrsaathi.com/privkey.pem;

    # Socket.IO must be proxied before the generic app/API locations.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # If React is served by Nginx from the VPS, point this to your built dist.
    # If React is served elsewhere, keep only the /api/ and /socket.io/ blocks
    # in that site's active HTTPS server block.
    root /var/www/hrms/erp-dashboard/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
